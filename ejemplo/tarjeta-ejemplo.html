<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tarjeta de propiedad · Propiedash</title>
<style>
  /* Marca Propiedash: lima #C7FF02 como acento, neutros cálidos, sin gradientes. */
  :root {
    --bg: #F7F7F5;
    --card: #FFFFFF;
    --border: #E8E8E3;
    --ink: #0A0A0A;
    --muted: #525249;
    --dim: #8A8A7F;
    --accent: #C7FF02;
    --on-accent: #0A0A0A;
    --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: var(--bg); color: var(--ink); font-family: var(--font); padding: 24px;
  }
  .card {
    width: 340px; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  /* Zona de foto: como no usamos imágenes externas, un bloque con un iconito. */
  .photo {
    height: 180px; background: #EFEFE9; display: grid; place-items: center;
    border-bottom: 1px solid var(--border); position: relative;
  }
  .photo svg { width: 54px; height: 54px; color: var(--dim); }
  .tag {
    position: absolute; top: 12px; left: 12px; background: var(--accent);
    color: var(--on-accent); font-size: 12px; font-weight: 700; padding: 4px 10px;
    border-radius: 9999px;
  }
  .body { padding: 16px 18px 18px; }
  .price { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .price small { font-size: 12px; font-weight: 600; color: var(--muted); }
  .title { font-size: 16px; font-weight: 700; margin: 6px 0 2px; }
  .loc { font-size: 13px; color: var(--muted); }
  .specs {
    display: flex; gap: 14px; margin: 14px 0; padding: 12px 0;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--ink);
  }
  .specs b { font-weight: 700; }
  .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .dashcode { font-family: var(--mono); font-size: 12px; color: var(--dim); }
  .agent { font-size: 13px; color: var(--muted); }
  .agent b { color: var(--ink); }
  .cta {
    display: block; width: 100%; margin-top: 14px; padding: 11px; text-align: center;
    background: var(--accent); color: var(--on-accent); border: none; border-radius: 8px;
    font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>
  <!-- Esta es una propiedad INVENTADA, solo para practicar. Cambia los datos por los tuyos. -->
  <article class="card">
    <div class="photo">
      <span class="tag">En venta</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9 20v-6h6v6"/></svg>
    </div>
    <div class="body">
      <div class="price">$120.000 <small>· Bs. a la tasa BCV</small></div>
      <div class="title">Apartamento en Los Palos Grandes</div>
      <div class="loc">Caracas · Los Palos Grandes</div>
      <div class="specs">
        <span><b>3</b> hab</span>
        <span><b>2</b> baños</span>
        <span><b>120</b> m²</span>
      </div>
      <div class="meta">
        <span class="dashcode">DPG-4821</span>
        <span class="agent">Agente <b>@mariainmuebles</b></span>
      </div>
      <button class="cta">Contactar</button>
    </div>
  </article>
</body>
</html>
